apiVersion: apps/v1
kind: Deployment
metadata:
  name: aqi-predictor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aqi-predictor
  template:
    metadata:
      labels:
        app: aqi-predictor
    spec:
      containers:
        - name: aqi-predictor
          image: aqi-predictor:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"